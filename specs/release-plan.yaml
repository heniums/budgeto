status: released
semantic_release: true
bump_hint: minor
created: '2026-07-15'
released: '2026-07-16'
description: >
  Refactor wallet and category management from slide-in Sheets to centered
  Dialog popups with a single unified always-editable view — no more
  create/edit/view mode switching. Implement nested dialogs from the
  transaction form, auto-select first wallet and category on open, enforce
  category as mandatory, and hard-guard the transaction form behind wallet +
  category existence requirements.

  Previous release (v0.4.0 'Unified Modals'): Sheet-based WalletModal and
  CategoryModal with create/edit/view modes — planned but now superseded by
  this Dialog-based approach in v0.5.0.

