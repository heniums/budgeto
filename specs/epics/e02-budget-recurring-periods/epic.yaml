summary: |
  Transform budgets from one-shot definitions into persistent filter/window
  definitions that automatically apply to all time periods of their type.
  Users can view spent vs. limit for any period (current or historical) by
  navigating through time. Periods are computed on-the-fly from the budget's
  period type — no separate period instances stored in database.
