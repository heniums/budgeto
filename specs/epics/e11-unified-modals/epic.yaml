# e11 — Unified Wallet & Category Modals
# Elaborated 2026-07-15 from specs/planning-context.yaml

id: e11
title: 'Unified Wallet & Category Modals'
status: planned
wsjf: 15
release: '0.4.0'
description: >
  Consolidate wallet and category creation, editing, and viewing into two
  unified Sheet-based modal components (WalletModal, CategoryModal) that
  replace four divergent UI surfaces. Implement sequential slide transition
  from TransactionForm without losing draft state. Integrate into Settings
  page, remove old full-page form routes and slide-in Sheet components.

