# e11s01 tasks — WalletModal + CategoryModal Components
tasks:
  - id: '1'
    desc: 'Create client/src/components/WalletModal.tsx'
    story: e11s01
    verify: 'npm run type-check -- --noEmit'
    details: >
      Build WalletModal with Sheet (side="right"), three modes: create/edit/view.
      Create mode: empty form with name, description, color. Submits via
      createWallet(). Edit mode: fetches wallet by ID, prefills form, submits
      via updateWallet(), delete via deleteWallet(). View mode: fetches wallet
      + filtered transactions, shows read-only with Edit button.
      Handle loading, empty, error states. Use useState for form fields.

