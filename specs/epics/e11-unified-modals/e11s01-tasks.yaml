    verify: 'npx vitest run client/src/components/WalletModal.test.tsx'
    details: >
      Test create mode: renders form, submits, calls onSuccess.
      Test edit mode: fetches and prefills, updates, handles delete.
      Test view mode: fetches and displays wallet + transactions.
      Test error states: API failure shows error message.
      Test loading state: shows "Loading…" initially.

