# e11s02 tasks — Transaction Form Auto-select, Mandatory Category & Hard Guard
story_id: e11s02
title: 'Transaction Form — Auto-select, Mandatory Category & Hard Guard'
status: planned
bcps: 4
tasks:
  - id: '1'
    desc: 'Make categoryId mandatory in TransactionForm schema'
    story: e11s02
    verify: 'npx vitest run client/src/components/TransactionForm.test.tsx'
    details: >
      Change categoryId Zod schema from z.string().optional() to
      z.string().min(1, 'Please select a category.'). The submit button
      should be disabled until a category is selected. Add validation
      error display for categoryId. Update test to verify category is
      required (form invalid without it).

  - id: '2'
    desc: 'Auto-select first wallet and category on transaction form open in Home page'
    story: e11s02
    verify: 'npm run type-check -- --noEmit'
    details: >
      In Home.tsx, when opening the transaction Dialog, compute
      firstWalletId (wallets[0].id) and firstCategoryId (categories[0].id)
      and pass as autoSelectWalletId/autoSelectCategoryId to TransactionForm.
      The existing useEffect hooks in TransactionForm handle the rest.

  - id: '3'
    desc: 'Disable "Add transaction" button when wallets or categories empty'
    story: e11s02
    verify: 'npx vitest run client/src/pages/Home.test.tsx'
    details: >
      In Home.tsx, conditionally render the Dialog+DialogTrigger (enabled
      Button) when wallets.length > 0 && categories.length > 0. Otherwise
      render a disabled Button with title tooltip and contextual guidance
      text. Show specific messages for missing wallets vs missing categories.

  - id: '4'
    desc: 'Update TransactionForm and Home tests'
    story: e11s02
    verify: 'npm test -- --run client/src/components/TransactionForm.test.tsx client/src/pages/Home.test.tsx'
    details: >
      TransactionForm tests: add test for mandatory category validation
      (form invalid without category, error shown on submit). Home tests:
      add tests for disabled button when wallets empty, disabled when
      categories empty, enabled when both exist, auto-select on open.
