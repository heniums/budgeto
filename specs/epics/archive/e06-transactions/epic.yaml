    title: 'Backend — Database Schema & Migration'
    status: done
    checkpoint: '59ec02f'
    description: >
      Transaction table (id, wallet_id FK cascade, category_id FK set null,
      amount numeric, description, created_at) plus migration 0004 adding
      the category_id FK.
    tasks:
      - Define transaction table in Drizzle schema with wallet + category FKs
      - Add ON DELETE CASCADE on transaction -> wallet FK
      - Migration 0004: add category_id column + FK (set null)
    verify:
      - 'npm test -- --run server'
      - 'npx drizzle-kit check'

  - id: e06s02
    title: 'Backend — Transactions API + Transfer'
    status: done
    checkpoint: 'b76ff08'
    description: >
      Repository, service, controller, and router for transaction CRUD and
      wallet-to-wallet transfer, auth-protected.
    tasks:
      - Implement transactions repository (create, list by wallet)
      - Implement transactions service (ownership checks, transfer logic)
      - Implement transactions controller (createHandler, listHandler, transferHandler)
      - Register routes (POST/GET /wallets/:walletId/transactions, POST /wallets/transfer)
