# Epic e06 — Transactions Management (CRUD + Wallet Transfers)
# Created by survey-context spec-sync on 2026-07-13
# Status: done — server merged earlier (59ec02f, b76ff08, 7b9b08d);
#         client UI + category assignment + migration 0004 in cf227f4 (feat/transactions-crud)

id: e06
title: 'Transactions Management (CRUD + Wallet Transfers)'
status: done
wsjf: 22
created_at: '2026-07-13'

description: >
  Record income/expense transactions against wallets, list them per wallet,
  and move money between wallets via wallet-to-wallet transfers. Transactions
  can optionally be tagged with a user category. Built on the existing wallet
  (e03) and category (e05) foundations.

spec:
  functional_requirements:
    - id: FR-1
      description: 'Transaction CRUD'
      sub_requirements:
        - id: FR-1.1
          description: 'Create — Record a transaction (amount, description, optional category) against a wallet.'
        - id: FR-1.2
          description: 'Read — List transactions for a wallet, ordered by creation time.'
    - id: FR-2
      description: 'Wallet-to-Wallet Transfer — Move an amount from a source wallet to a target wallet, creating paired transactions.'
    - id: FR-3
      description: 'Category Assignment — Optionally attach a category to a transaction (set null on category delete).'
    - id: FR-4
      description: 'Ownership & Auth — All endpoints auth-protected; users only see transactions for wallets they own.'
    - id: FR-5
      description: 'Backend API — RESTful endpoints under /wallets/:walletId/transactions and /wallets/transfer, Drizzle ORM.'
    - id: FR-6
      description: 'UI — Transactions list page, create form, and transfer form in the client PWA.'

  acceptance_criteria:
    - Authenticated user opens a wallet and sees its transaction list.
    - User creates a transaction — it appears in the list immediately.
    - User transfers funds between two wallets — both balances update and paired transactions are recorded.
    - User can assign a category to a transaction.
    - Transactions are scoped to wallets the user owns.
    - All API operations are protected by authentication.
    - Migration adds the category_id FK to the transaction table.

  out_of_scope:
    - Recurring/scheduled transactions.
    - Transaction editing/deletion (v1 is create + list + transfer only).
    - Category-based reporting/aggregation.

stories:
