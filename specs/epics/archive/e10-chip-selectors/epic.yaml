# e10 — Wallet & Category Chip-List Selectors
# Elaborated 2026-07-15 from specs/planning-context.yaml

id: e10
title: 'Wallet & Category Chip-List Selectors'
status: planned
wsjf: 13
release: '0.3.0'
description: >
  Replace the plain <select> dropdowns in TransactionForm with horizontally
  scrollable chip lists that show wallet/category visual identity (colored
  badges for wallets, colored icons for categories). Tap to select,
  long-press to edit, "+" to create, "View All" to browse in a grid modal.
  All dialogs are inline so the transaction draft is never lost.

