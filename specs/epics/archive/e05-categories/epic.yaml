# Epic e05 — Category Management System
# Migrated from conductor/tracks/categories_20260713/ on 2026-07-13
# Status: in_progress

id: e05
title: 'Category Management System'
status: done
wsjf: 18
created_at: '2026-07-13'
completed_at: '2026-07-13'

description: >
  Full CRUD category management — users create, view, edit, and delete
  categories for organizing expenses and income. Categories are user-scoped
  (shared across all wallets), managed from the Settings section. Each category
  has a name, income/expense type, color (hex code), and icon (lucide-react).

spec:
  functional_requirements:
    - id: FR-1
      description: 'Category CRUD Operations'
      sub_requirements:
        - id: FR-1.1
          description: 'Create — Users can create a new category with name, type, color, and icon.'
        - id: FR-1.2
          description: 'Read — Users can view a list of all their categories with name, type, color, and icon.'
        - id: FR-1.3
          description: 'Update — Users can edit any property of an existing category.'
        - id: FR-1.4
          description: 'Delete — Users can delete a category they no longer need.'
    - id: FR-2
      description: 'Category Properties — name (required), type (income/expense enum), color (hex string), icon (string).'
    - id: FR-3
      description: 'Category Scope — Categories are user-scoped; each user manages their own independent set.'
    - id: FR-4
      description: 'UI Integration — Accessible from Settings, follows existing design patterns.'
    - id: FR-5
      description: 'Backend API — RESTful endpoints under /api/categories, all auth-protected, Drizzle ORM with migration.'
    - id: FR-6
      description: 'Icon Library — Use lucide-react for financial category icons.'

  acceptance_criteria:
    - Authenticated user navigates to Settings > Categories and sees their list.
    - User creates a new category — it appears in the list immediately.
    - User edits a category — changes persist and display correctly.
    - User deletes a category — it is removed from the list.
    - Categories are properly scoped to the user (other users cannot see/modify them).
    - All API operations are protected by authentication.
    - Database migration creates the categories table correctly.

  out_of_scope:
    - Associating categories with specific wallets (categories are global per user).
    - Category hierarchy/nesting (parent-child categories).
    - Default/system-provided categories.
    - Category budgeting (budget allocation per category is a separate future track).

stories:
  - id: e05s01
    title: 'Backend — Database Schema & Migration'
    status: done
    checkpoint: '664f2b0'
    description: >
      Define categories table in Drizzle schema, run migration,
      and write schema shape/constraint tests.
    tasks:
      - Write tests for categories table schema shape and constraints
      - Add `category` table (id uuid PK, user_id FK, name text, type text, color text, icon text, timestamps) to schema.ts
      - Run Drizzle migration to create the table
    verify:
      - 'npm test -- --run server'
      - 'npx drizzle-kit check'

  - id: e05s02
