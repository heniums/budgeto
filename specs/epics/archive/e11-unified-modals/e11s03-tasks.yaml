tasks:
  - id: '1'
    desc: 'Wire nested dialog orchestration in Home page'
    story: e11s03
    verify: 'npx vitest run client/src/pages/Home.test.tsx'
    details: >
      Update Home.tsx to use refactored WalletModal/CategoryModal without
      mode prop. The nested dialog stacking works naturally via Radix.
      Update pendingWalletId/pendingCategoryId logic: after creating a
      wallet/category from the nested dialog, auto-select the new item
      in the transaction form. Wire onViewWallet callback from
      TransactionForm to open WalletModal for the selected wallet ID
      (unified view, all fields editable).

  - id: '2'
    desc: 'Wire chip-selector onEdit to open unified modals from Home'
    story: e11s03
    verify: 'npm run type-check -- --noEmit'
    details: >
      TransactionForm already passes onViewWallet. Since the unified modal
      has no separate view mode, reuse this for editing — clicking "View
      wallet details" opens the unified Dialog with fields editable.
      The existing WalletSelectList/CategorySelectList onEdit context menu
      callbacks already work through the parent. No changes needed to the
      chip selectors themselves.

  - id: '3'
    desc: 'Update WalletList page for Dialog-based WalletModal'
    story: e11s03
    verify: 'npx vitest run client/src/pages/WalletList.test.tsx'
    details: >
      Update WalletList.tsx: remove mode prop from WalletModal. The
      modalMode state still drives open/close and walletId. When
      modalMode is 'create', walletId is null (create mode). When
      modalMode is 'view', walletId is set (unified editable mode).
      Update tests for new props and behavior.

