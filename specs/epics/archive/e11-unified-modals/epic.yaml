# e11 — Dialog Modals & Transaction Guards
# Rewritten 2026-07-15 for Dialog-based unified approach.
# Supersedes prior Sheet-based epic definition.

id: e11
title: 'Dialog Modals & Transaction Guards'
status: planned
wsjf: 15
release: '0.5.0'
description: >
  Refactor WalletModal and CategoryModal from Sheet (slide-in sidebar) to
  Dialog (centered popup) with a single unified always-editable view. No more
  create/edit/view mode switching — form fields are always live, Save enables
  on dirty, Delete always visible. Implement nested dialogs from the
  transaction form, auto-select first wallet and category on transaction form
  open, enforce category as mandatory, and hard-guard the "Add transaction"
  button behind wallet + category existence requirements.

