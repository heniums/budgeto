description: >
  Make Budgeto immediately usable for a first-time visitor by adding a 3-step
  onboarding wizard (Create Wallet → Create Category → Add Transaction),
  conditional empty-state guidance for returning users, contextual long-press /
  right-click access to wallet/category details from any transaction row, and
  stacked modal transitions that preserve form state. Also adds the missing
  category column to the transaction table (data already in DB, omitted from
  the server SELECT).

