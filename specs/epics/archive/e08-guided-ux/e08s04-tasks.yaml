story_id: e08s04
title: Stacked modal transitions with form state preservation
status: passing
bcps: 3
spec: e08s04-stacked-modals.md
tasks:
  - id: 1
    description: >
      Refactor the Add Transaction dialog (Home.tsx) and Transfer dialog to
      use a stacked-modal pattern: when the user triggers a wallet or category
      creation/edit from within the form, the transaction form slides out
      (translate-x animation or opacity+fade) and the wallet/category
      detail/edit view slides in. On save/cancel, the detail view slides back
      out and the transaction form slides back in with all field values
      preserved.
    verify: 'npm test -- client/src/pages/Home.test.tsx'
    risk: P1
    status: passing
    allure:
      severity: high
      categories:
        - 'Client'
        - 'Modal Transitions'
  - id: 2
    description: >
      Implement form state preservation: keep the transaction form mounted
      (not unmounted) while the detail view is shown. Use CSS visibility or
      display:none on the form container rather than conditional rendering.
      Verify that all form fields (amount, description, wallet, category,
      date) retain their values after the round-trip.
    verify: 'npm test -- client/src/components/TransactionForm.test.tsx'
    risk: P1
    status: passing
    allure:
      severity: high
      categories:
        - 'Client'
        - 'Form State'
  - id: 3
    description: >
      Wire the TransactionForm "Create wallet" / "Create category" inline
      links (from e08s02 task 4) to the stacked modal. When a new
      wallet/category is created via the stacked modal, auto-select it in
      the transaction form's wallet/category dropdown after sliding back.
    verify: 'npm test -- client/src/components/TransactionForm.test.tsx'
    risk: P1
    status: passing
    allure:
      severity: high
      categories:
        - 'Client'
        - 'Form State'
