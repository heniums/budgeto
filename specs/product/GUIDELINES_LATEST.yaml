# Budgeto — Product Guidelines
# Migrated from conductor/product-guidelines.md on 2026-07-13

prose_style:
  tone: 'Conversational & encouraging.'
  description: >
    Copy speaks to the user in a friendly, approachable voice. Celebrate small wins
    (e.g., "Nice! You're 10% under budget this month") and guide gently when
    something needs attention. Keep microcopy short; avoid jargon.

branding:
  palette: 'Trustworthy palette.'
  description: >
    Use calm greens and blues that evoke stability and financial growth. Maintain a
    restrained, confident look rather than loud or playful colors.

ux_principles:
  - id: UX-001
    description: >
      Fast entry — Core tasks, especially adding an expense, must be reachable in
      1–2 taps/clicks. Reduce friction on the most frequent actions.
  - id: UX-002
    description: >
      Prefer sensible defaults so users can act first and configure later.

accessibility:
  standard: WCAG AA compliance
  requirements:
    - Sufficient color contrast
    - Full keyboard navigation
    - Properly labeled controls and inputs
    - Do not rely on color alone to convey meaning

general:
  - Consistency over cleverness: reuse components and patterns.
  - Respect the user's data; never show alarming or ambiguous messages about their money.

source: conductor/product-guidelines.md
