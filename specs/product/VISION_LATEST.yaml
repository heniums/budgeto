# Budgeto — Product Vision
# Migrated from conductor/product.md on 2026-07-13

vision: >
  Budgeto is a personal finance and budgeting application that helps individuals
  take control of their money. It enables users to track expenses, manage budgets,
  and gain financial insights through clear reporting.

north_star: >
  A user can record an expense, assign a category, and view it reflected in a
  dashboard within one session.

target_users:
  primary: Individuals managing personal day-to-day spending.
  secondary: Families and freelancers (future consideration).

core_goals:
  - id: G-001
    description: 'Track Expenses — Log and categorize transactions as they happen.'
  - id: G-002
    description: 'Manage Budgets — Define budgets per category and monitor progress.'
  - id: G-003
    description: 'Financial Insights — Surface trends and summaries via reports and dashboards.'

key_features:
  - id: F-001
    description: >
      Expense Categorization — Tag and categorize spending
      (automatic suggestions + manual override).
  - id: F-002
    description: >
      Reports & Dashboards — Visual summaries (monthly/yearly) of income,
      spending, and budget health.
  - id: F-003
    description: >
      Expense entry and budget definition underpin the above features.

platform:
  type: Progressive Web App (PWA)
  description: >
    A responsive web application that also installs on Android, allowing use on
    both web and mobile from a single codebase. Offline-capable for core views.

success_criteria:
  - A user can record an expense, assign a category, and view it reflected in a dashboard within one session.
  - A user can define a monthly budget per category and see progress against it.
  - The app is installable on Android and usable offline for core views (PWA).

source: conductor/product.md
