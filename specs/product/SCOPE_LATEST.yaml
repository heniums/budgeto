# specs/product/SCOPE_LATEST.yaml — Bounded PRD for Unified Modal System.
# Written by scope-work (planning spine step 1) on 2026-07-15.
# Consumes specs/planning-context.yaml (elaborate-spec output).

core_value: >
  Consolidate wallet and category creation, editing, and viewing into two
  unified Sheet-based modal components (WalletModal, CategoryModal) that
  replace four divergent UI surfaces and enable a smooth sequential slide
  transition from the TransactionForm without losing draft state.

summary: >
  Budgeto currently has four different UI surfaces for wallet and category
  CRUD: slide-in Sheets (WalletDetailSheet/CategoryDetailSheet), inline
  Dialogs inside chip-selectors (WalletEditDialog/WalletCreateDialog etc.),
  and full-page form routes in Settings (WalletForm/WalletDetail/CategoryForm).
  This fragmentation duplicates code, creates inconsistent UX, and breaks the
  transaction flow — creating a wallet while filling a transaction form loses
  the entire transaction draft.

  This initiative creates two unified modal components — WalletModal and
  CategoryModal — using shadcn Sheet (slide-in from right) with three modes:
  create, edit, and view. These modals become the single source of truth for
  wallet/category CRUD everywhere in the app.

  In the TransactionForm flow, the transaction Dialog and the wallet/category
  Sheet participate in a sequential replace animation: the Dialog closes (state
  preserved in the parent), the Sheet slides in, and on save/cancel the Sheet
  closes and the Dialog reopens with the form exactly as left.

  The Settings page keeps its list views (WalletList, Categories) but uses
  WalletModal/CategoryModal for add/edit/view instead of navigating to separate
  route pages. The WalletDetail page, WalletForm, and CategoryForm page routes
  are removed.

  WalletSelectList and CategorySelectList are simplified to emit callbacks
  (onCreate, onEdit) instead of managing their own dialogs.

in_scope:
  - id: SC-1
    description: >
      WalletModal component — a Sheet-based modal with create, edit, and view
      modes. Create mode: empty form (name, description, color). Edit mode:
      prefilled form with save/delete. View mode: read-only display of wallet
      info + filtered transactions list. Replaces WalletDetailSheet,
      WalletEditDialog, WalletCreateDialog, WalletForm page, WalletDetail page.
  - id: SC-2
    description: >
      CategoryModal component — a Sheet-based modal with create, edit, and view
      modes. Create mode: empty form (name, type, color, icon grid). Edit mode:
      prefilled form with save/delete. View mode: read-only display of category
      info. Replaces CategoryDetailSheet, CategoryEditDialog,
      CategoryCreateDialog, CategoryForm page.
  - id: SC-3
    description: >
      Sequential slide transition from TransactionForm. When the user clicks
      "Create wallet" or long-presses a wallet chip, the transaction Dialog
      closes (form state preserved in parent via ref or lifted state), then
      WalletModal/CategoryModal Sheet slides in. On save/cancel, Sheet closes
      and transaction Dialog reopens with all fields intact.
  - id: SC-4
    description: >
      Simplify WalletSelectList and CategorySelectList — remove all inline
      Dialog components (WalletEditDialog, WalletCreateDialog,
      WalletViewAllDialog, CategoryEditDialog, CategoryCreateDialog,
      CategoryViewAllDialog). Instead, emit callbacks: onCreate, onEdit(wallet),
      onViewAll. Parent handles modal management.
  - id: SC-5
    description: >
      Settings page integration — WalletList and Categories pages stay as-is
      (list views). Tapping a wallet opens WalletModal in view mode. Tapping
      "New Wallet" opens WalletModal in create mode. Tapping "Edit" opens
      WalletModal in edit mode. Same pattern for categories. Remove
      /settings/wallets/new, /settings/wallets/:id, /settings/wallets/:id/edit,
      /settings/categories/new, /settings/categories/:id/edit routes.
  - id: SC-6
    description: >
      Home page refactor — manage the sequential modal state machine
      (transaction Dialog ↔ wallet/category Sheet). Remove WalletDetailSheet
      and CategoryDetailSheet usage. Wire up WalletModal and CategoryModal
      for all wallet/category interactions originating from Home.
  - id: SC-7
    description: >
      Tests and cleanup — add component tests for WalletModal and CategoryModal
      (create/edit/view modes, form validation, API calls). Update
      WalletSelectList and CategorySelectList tests (remove dialog tests, add
      callback tests). Update Home page tests. Remove tests for deleted
      components. Ensure npm test (>=80% coverage) and npm run type-check pass.

out_of_scope:
  - id: OOS-1
    item: 'Changes to the transfer form dialog.'
    reason: 'The transfer form is unchanged and continues using its current selectors.'
  - id: OOS-2
    item: 'New database migrations or server endpoints.'
    reason: 'All required fields and APIs already exist.'
  - id: OOS-3
    item: 'Changes to the OnboardingWizard flow.'
    reason: 'The wizard may use WalletModal/CategoryModal in a future iteration but is not in scope now.'
  - id: OOS-4
    item: 'Changes to Profile, SignIn, or SignUp pages.'
    reason: 'These pages are unrelated to wallet/category CRUD.'
  - id: OOS-5
    item: 'Animation library or new npm dependency for transitions.'
    reason: 'shadcn Sheet already provides slide animation. Dialog close/open provides sufficient transition feel.'
  - id: OOS-6
    item: 'Changes to the Layout sidebar navigation.'
    reason: 'The sidebar navigation (Home, Settings) is unrelated to this feature.'

constraints:
  - 'Reuse existing shadcn/ui primitives (Sheet, Button, Input, Label, Badge, ScrollArea) and lucide-react icons.'
  - 'No new npm dependencies.'
  - 'Reuse existing API modules (api/wallets.ts, api/categories.ts, api/transactions.ts).'
  - 'No new server endpoints or database migrations.'
  - 'npm test (>=80% coverage) and npm run type-check must remain green.'
  - 'Transaction form state must survive the wallet/category Sheet round-trip.'
  - 'WalletModal and CategoryModal must handle loading, empty, and error states gracefully.'

success_criteria:
  - 'WalletModal handles create, edit, and view modes with proper form validation.'
  - 'CategoryModal handles create, edit, and view modes with proper form validation and icon grid.'
  - 'From the TransactionForm, clicking "Create wallet" closes the transaction Dialog, opens WalletModal in create mode, and on save returns to the transaction Dialog with all fields preserved.'
  - 'Long-pressing a wallet chip in the TransactionForm opens WalletModal in edit mode with fields prefilled.'
  - 'In Settings → Wallets, tapping a wallet opens WalletModal in view mode showing wallet info and transactions.'
  - 'In Settings → Wallets, tapping "New Wallet" opens WalletModal in create mode.'
  - 'Same patterns work for categories.'
  - 'WalletDetailSheet, CategoryDetailSheet, WalletForm page, CategoryForm page, WalletDetail page, and all inline Dialogs in chip-selectors are removed.'
  - 'npm test passes with >=80% coverage and npm run type-check exits clean.'
  - 'No new orphans or dead code introduced.'

references:
  - specs/planning-context.yaml
  - specs/product/VISION_LATEST.yaml
  - specs/release-plan.yaml
  - specs/tech-architecture/TECH_STACK_LATEST.md
