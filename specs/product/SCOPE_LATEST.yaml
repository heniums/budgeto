# specs/product/SCOPE_LATEST.yaml — Bounded PRD for Chip-List Selectors initiative.
# Written by scope-work (planning spine step 1) on 2026-07-15.
# Consumes specs/planning-context.yaml (elaborate-spec output).

core_value: >
  Replace the TransactionForm's plain dropdown selects with visually rich,
  horizontally scrollable chip lists that show wallet/category identity at a
  glance and allow inline CRUD without losing the transaction draft.

summary: >
  The TransactionForm currently uses HTML <select> dropdowns for wallet and
  category choice. These show only the resource name as text — no color, no
  icon — and offer no path to create or edit a wallet/category without
  abandoning the form. This undermines the visual design language established
  for wallets and categories elsewhere and blocks users who realize mid-entry
  that they need a new wallet or category.

  This initiative introduces two new components — WalletSelectList and
  CategorySelectList — that render the user's wallets and categories as a
  horizontally scrollable row of chips. Wallet chips appear as colored badges
  (border + text in the wallet's color). Category chips show the category icon
  rendered in the category's color. A single tap selects the item; a long-press
  opens an inline full-form edit dialog. A "View All" trigger at the end of the
  row opens a compact grid modal for browsing and selecting from all available
  items. A "+" trigger opens an inline full-form creation dialog.

  The scope is strictly limited to the TransactionForm. Existing wallet/category
  management pages and all other select inputs remain unchanged. No new database
  migrations or server endpoints are needed — all required fields already exist.

in_scope:
  - id: SC-1
    description: >
      WalletSelectList component — horizontally scrollable row of wallet chips.
      Each chip is a badge with colored border and text showing the wallet name.
      Tap to select, long-press to open inline full-form edit dialog. Includes
      "View All" trigger (compact grid modal) and "+" trigger (inline full-form
      creation dialog).
  - id: SC-2
    description: >
      CategorySelectList component — horizontally scrollable row of category
      chips. Each chip shows the category icon rendered in the category's color.
      Shows all categories regardless of type (income + expense mixed). Tap to
      select, long-press to open inline full-form edit dialog. Includes
      "View All" trigger (compact grid modal) and "+" trigger (inline full-form
      creation dialog).
  - id: SC-3
    description: >
      Integration into TransactionForm — replace the existing wallet and
      category <select> dropdowns with WalletSelectList and CategorySelectList.
      The TransactionForm's submit logic and validation remain unchanged; only
      the selection UI is replaced. Form state is preserved when the inline
      edit/creation dialogs open and close.
  - id: SC-4
    description: >
      Inline edit and creation dialogs — reuse the existing wallet/category
      form field sets (name, description, color for wallets; name, type, color,
      icon for categories) inside shadcn/ui Dialog components. Submitting the
      dialog calls the existing API functions and refreshes the list.
  - id: SC-5
    description: >
      Tests and type-check — add component tests for WalletSelectList and
      CategorySelectList (selection, long-press, dialogs, keyboard navigation).
      Update TransactionForm tests to reflect the new selectors. Ensure
      npm test (>=80% coverage) and npm run type-check pass cleanly.

out_of_scope:
  - id: OOS-1
    item: 'Changes to existing /categories or /wallets management pages.'
    reason: 'Explicitly excluded — these pages remain as-is. The chip lists are an alternative selection UI within TransactionForm only.'
  - id: OOS-2
    item: 'Changes to any select inputs outside TransactionForm.'
    reason: 'Excluded — all other forms and pages keep their current dropdowns.'
  - id: OOS-3
    item: 'New database migrations.'
    reason: 'Not needed — wallet color and category icon/color fields already exist in the schema.'
  - id: OOS-4
    item: 'New server endpoints.'
    reason: 'Not needed — existing GET/POST/PUT wallets and categories endpoints serve the inline dialogs.'
  - id: OOS-5
    item: 'Client-side filtering of categories by transaction type.'
    reason: 'Explicitly excluded — all categories (income + expense) are shown together in the chip list by design decision.'
  - id: OOS-6
    item: 'Changes to the transfer form dialog.'
    reason: 'Excluded — the transfer form is unchanged and continues using its current selectors.'
  - id: OOS-7
    item: 'Drag-to-reorder or other gestures beyond tap and long-press.'
    reason: 'Deferred — not part of the initial chip-list feature. May be considered in a future iteration.'
  - id: OOS-8
    item: 'New npm dependencies.'
    reason: 'Excluded unless a library is required and justifies the cost. Existing shadcn/ui primitives and lucide-react icons should suffice.'

constraints:
  - 'TransactionForm only — no changes to other forms or existing wallet/category pages.'
  - 'Reuse existing shadcn/ui primitives (Dialog, Badge, Button, ScrollArea) and lucide-react icons.'
  - 'No new npm dependencies unless justified and lightweight.'
  - 'Wallets: show as badge with colored border + text (wallet name). No icon.'
  - 'Categories: show icon glyph rendered in the category color. All types mixed together.'
  - 'Inline edit and creation dialogs use the full existing form fields.'
  - 'npm test (>=80% coverage) and npm run type-check must remain green.'
  - 'Horizontal scroll must work on touch (mobile) and with mouse/trackpad (desktop).'
  - 'Long-press must work on touch devices; a desktop alternative (right-click or hover button) must also be supported.'
  - 'Client API modules (api/wallets.ts, api/categories.ts) are reused — no new API calls needed.'

success_criteria:
  - 'In the Add Transaction form, wallets appear as a horizontally scrollable row of colored badges instead of a <select> dropdown.'
  - 'In the Add Transaction form, categories appear as a horizontally scrollable row of colored icons instead of a <select> dropdown.'
  - 'Tapping a wallet or category chip selects it and the selection is visually indicated.'
  - 'Long-pressing a wallet or category chip on mobile opens an inline edit dialog with all fields prefilled.'
  - 'Right-clicking (or equivalent desktop trigger) a chip opens the inline edit dialog.'
  - 'The "View All" trigger opens a compact grid modal showing all wallets/categories; tapping one selects it and closes the modal.'
  - 'The "+" trigger opens a full-form creation dialog; submitting creates the resource and adds it to the list.'
  - 'Opening and closing the edit/creation dialogs preserves all fields in the TransactionForm (description, amount, etc.).'
  - 'npm test passes with >=80% coverage and npm run type-check exits clean.'

references:
  - specs/planning-context.yaml
  - specs/product/VISION_LATEST.yaml
  - specs/release-plan.yaml
  - specs/tech-architecture/TECH_STACK_LATEST.md
