core_value: Let users set a wallet balance to an exact target number with a single action, backed by an auto-created audit trail transaction.

summary: >
  Wallets today compute their balance from the sum of all linked transactions,
  but there is no way to directly set that balance to a desired target. Users
  must manually craft offsetting transactions — slow, error-prone, and opaque.

  This feature adds a dedicated adjustment endpoint that accepts a target
  balance, computes the delta against the current computed balance, and creates
  a balancing transaction linked to a "Balance Adjustment" category. The
  category is auto-created per-user on first use.

  As an enabler, the legacy `type` column (income/expense) is removed from the
  categories table. Income vs. expense is already determined by transaction
  amount sign; the category-level type creates a false coupling that blocks a
  single category from serving both direction adjustments.

in_scope:
  - Remove `type` column from categories table (DB migration + all layers)
  - New `POST /wallets/:id/adjust` endpoint accepting target balance
  - Auto-create "Balance Adjustment" category for user on first adjustment
  - Compute delta = target - current and create an adjustment transaction
  - Client UI: adjust button on wallet detail with target balance input

out_of_scope:
  - Editing or deleting adjustment transactions: Reason — existing transaction CRUD already covers this.
  - Recurring/scheduled adjustments: Reason — deferred; no evidence of user demand yet.
  - Bulk adjustments across multiple wallets: Reason — deferred; adds UI complexity without proven need.
  - Adjustment history beyond the normal transaction list: Reason — the transaction list with a category filter already provides this view.
  - Backfill or import of legacy category types: Reason — not applicable; categories without a type column simply have no type.

constraints:
  - PostgreSQL + Drizzle ORM; migration must be generated via `npx drizzle-kit generate`
  - Category removal must not break the budgets validateCategories check
  - Transaction list `type` filter already uses amount sign, not category type — must remain functional
  - Adjustment endpoint must verify wallet ownership before processing
  - The delta transaction must be created atomically (single request, no partial state)

success_criteria:
  - Wallet at $342.17, user adjusts to $500.00 → one $157.83 transaction created under "Balance Adjustment"
  - Wallet at $500.00, user adjusts to $200.00 → one -$300.00 transaction created under same category
  - First-ever adjustment auto-creates the "Balance Adjustment" category for that user
  - Second adjustment reuses the existing category
  - Category create/edit forms no longer show a type selector
  - Budget creation no longer rejects non-expense categories
  - Transaction list filter by income/expense continues to work (amount-sign-based)
  - All existing tests pass (updated for removed category type)

references:
  - specs/planning-context.yaml
