# specs/product/SCOPE_LATEST.yaml — Bounded PRD for Dialog-based Unified Modals.
# Rewritten 2026-07-15 from updated specs/planning-context.yaml.
# Supersedes prior Sheet-based approach.

core_value: >
  Convert wallet and category management from slide-in Sheets to centered
  Dialog popups with a single unified view (no create/edit/view mode switching).
  Implement nested dialogs from the transaction form, auto-select the first
  wallet and category on transaction form open, and hard-guard the transaction
  form behind wallet + category existence requirements.

summary: >
  Budgeto currently uses Sheet-based slide-in modals (WalletModal, CategoryModal)
  with separate create/edit/view modes that require clicking "Edit" to leave
  read-only view. The transaction form is always openable even when no wallets
  or categories exist.

  This initiative refactors WalletModal and CategoryModal to use shadcn Dialog
  (centered popup) with a single unified view where form fields are always
  editable. "Save Changes" enables on dirty detection. "Delete" is always
  visible. The transaction form gains a hard guard — the "Add transaction"
  button is disabled when wallets or categories are empty, and the form
  auto-selects the first wallet and category on open. Category becomes
  mandatory for transactions.

  Nested dialogs: opening a wallet/category Dialog from within the transaction
  Dialog stacks it on top via Radix's native dialog nesting. The transaction
  form state is preserved naturally since the underlying Dialog stays mounted.

in_scope:
  - id: SC-1
    description: >
      Refactor WalletModal from Sheet to Dialog. Remove mode prop and
      internalMode toggle. Single unified view: form fields (name, description,
      color) always editable. "Save Changes" enables on formState.isDirty.
      "Delete" button always visible. No transaction list in view mode
      (form-only layout). Update WalletModal tests.
  - id: SC-2
    description: >
      Refactor CategoryModal from Sheet to Dialog. Remove mode prop and
      internalMode toggle. Single unified view: form fields (name, type,
      color, icon grid) always editable. "Save Changes" enables on
      formState.isDirty. "Delete" button always visible. Form-only layout.
      Update CategoryModal tests.
  - id: SC-3
    description: >
      Transaction form hard guard: "Add transaction" button in Home page is
      disabled when wallets.length === 0 OR categories.length === 0. Show
      explanatory text guiding user to create first wallet/category. No
      inline alerts inside the form — the form simply cannot be opened.
  - id: SC-4
    description: >
      Transaction form auto-select: on open, auto-select the first wallet
      AND first category via autoSelectWalletId/autoSelectCategoryId props.
      Category is now mandatory (schema: categoryId z.string().min(1)).
  - id: SC-5
    description: >
      Nested dialog orchestration from TransactionForm: clicking "Create
      wallet →" / "Create category →" opens WalletModal/CategoryModal Dialog
      ON TOP of the transaction Dialog (Radix native stacking). On save,
      new item auto-selects and focus returns to transaction Dialog.
      WalletSelectList/CategorySelectList onEdit callbacks open the unified
      Dialog with the item pre-populated.
  - id: SC-6
    description: >
      Settings pages (WalletList, Categories) use the same refactored
      Dialog-based modals. No route changes needed — just the modal
      components they consume are updated.
  - id: SC-7
    description: >
      Tests and cleanup: update WalletModal, CategoryModal, TransactionForm,
      WalletSelectList, CategorySelectList, Home page, WalletList, and
      Categories tests. Ensure npm test (>=80% coverage) and npm run
      type-check pass.

out_of_scope:
  - id: OOS-1
    item: 'Changes to the transfer form dialog.'
    reason: 'The transfer form is unchanged.'
  - id: OOS-2
    item: 'New database migrations or server endpoints.'
    reason: 'All required fields and APIs already exist.'
  - id: OOS-3
    item: 'Changes to the OnboardingWizard flow.'
    reason: 'The wizard may reuse modals in a future iteration but is out of scope now.'
  - id: OOS-4
    item: 'Changes to Profile, SignIn, or SignUp pages.'
    reason: 'These pages are unrelated to wallet/category CRUD.'
  - id: OOS-5
    item: 'New npm dependencies.'
    reason: 'shadcn Dialog is already available in client/src/components/ui/dialog.tsx.'
  - id: OOS-6
    item: 'Backend enforcement of mandatory category.'
    reason: 'Client-side enforcement only for now. Server schema has categoryId as optional.'
  - id: OOS-7
    item: 'Removal of Settings routes or pages.'
    reason: 'WalletList and Categories pages stay as list views. Only the modals they consume change.'

constraints:
  - 'Reuse existing shadcn/ui Dialog primitive (client/src/components/ui/dialog.tsx).'
  - 'No new npm dependencies.'
  - 'Reuse existing API modules (api/wallets.ts, api/categories.ts, api/transactions.ts).'
  - 'No new server endpoints or database migrations.'
  - 'npm test (>=80% coverage) and npm run type-check must remain green.'
  - 'Radix Dialog natively supports nested dialogs — no custom z-index management needed.'
  - 'Category is mandatory client-side only (TransactionForm schema change).'

success_criteria:
  - 'WalletModal uses Dialog (not Sheet) with unified always-editable view. Save enables on dirty.'
  - 'CategoryModal uses Dialog (not Sheet) with unified always-editable view. Save enables on dirty.'
  - '"Add transaction" button is disabled when wallets or categories are empty, with guidance text.'
  - 'Opening transaction form auto-selects first wallet and first category.'
  - 'Creating a wallet from inside the transaction form opens a nested Dialog; saving returns focus with new wallet auto-selected.'
  - 'Creating a category from inside the transaction form opens a nested Dialog; saving returns focus with new category auto-selected.'
  - 'Editing a wallet/category via chip context menu opens unified Dialog with fields pre-populated.'
  - 'npm test passes with >=80% coverage and npm run type-check exits clean.'

references:
  - specs/planning-context.yaml
  - specs/product/VISION_LATEST.yaml
  - specs/release-plan.yaml
  - specs/tech-architecture/TECH_STACK_LATEST.md
