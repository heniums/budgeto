# specs/product/SCOPE_LATEST.yaml — Bounded PRD for Guided UX initiative.
# Written by scope-work (planning spine step 1) on 2026-07-14.
# Consumes specs/planning-context.yaml (elaborate-spec output).

core_value: >
  Make Budgeto immediately usable for a first-time visitor by guiding them
  through wallet → category → transaction creation, and make wallets and
  categories reachable from anywhere via contextual long-press/right-click.

summary: >
  The current Budgeto app (v0.1.0) shows a flat transaction table with no
  category column, no contextual navigation to wallets/categories, and no
  onboarding path. A new user lands on "No transactions found" with no clue
  what to do next. The Add Transaction form blocks you from creating a missing
  wallet or category inline — you must abandon the form, navigate to Settings,
  then start over.

  This initiative adds a 3-step dismissable onboarding wizard (Create Wallet →
  Create Category → Add Transaction) that appears on first visit and can be
  re-triggered from the user menu. Empty states throughout the app show
  conditional guidance ("You have no wallets — create one?"). Transaction rows
  gain a category column with colored badges, and both wallet and category
  labels become interactive: long-press on mobile, right-click on desktop opens
  the detail/edit view in a stacked modal. The transaction form state survives
  the round-trip — the wallet/category view slides in over the form, and slides
  back when done.

  The server transaction query is updated to include category data (categoryId
  + category name via a join), which is already present in the database schema
  but omitted from the current SELECT. No new endpoints or database migrations
  are required.

in_scope:
  - id: SC-1
    description: >
      Category data plumbing — include categoryId and category name in the
      server's GET /transactions response (join categories table), update the
      client TransactionData type, and render a Category column in the
      transaction table with a colored badge showing the category name.
  - id: SC-2
    description: >
      Onboarding wizard — a dismissable 3-step overlay (Create Wallet → Create
      Category → Add Transaction) that appears on first visit for users with
      zero wallets. Re-triggerable from the user menu. Responsive on all
      viewports.
  - id: SC-3
    description: >
      Conditional empty-state guidance — Home page shows contextual prompts:
      "You have no wallets yet — create your first wallet" when wallets=0;
      "You have no categories yet — create your first category" when
      categories=0 but wallets>0. Each prompt has a direct CTA button that
      opens the appropriate creation flow.
  - id: SC-4
    description: >
      Contextual wallet/category access — long-press (mobile touch-hold) or
      right-click (desktop) on a wallet or category label in any transaction
      row or in the transaction form opens the detail/edit view for that
      resource. The edit view is the same component used in Settings tabs,
      reached via a context menu or action sheet.
  - id: SC-5
    description: >
      Stacked modal transitions — the Add Transaction dialog and the
      wallet/category detail view use a slide-out / slide-in pattern so the
      transaction form stays mounted with all field values preserved while the
      user creates or edits a wallet/category, then resumes.
  - id: SC-6
    description: >
      Tests and type-check — update existing client and server tests to cover
      the category column, onboarding wizard, empty states, context menus, and
      modal transitions. Ensure npm test (>=80% coverage) and npm run
      type-check pass cleanly.

out_of_scope:
  - id: OOS-1
    item: 'Dashboard analytics / summary cards (balances, trends).'
    reason: 'Deferred to G-003 Financial Insights. Not part of the guided UX initiative.'
  - id: OOS-2
    item: 'Dark mode / theming.'
    reason: 'Deferred. Not in scope for v0.2.0.'
  - id: OOS-3
    item: 'Category budgeting (budgets per category, progress tracking).'
    reason: 'Deferred to G-002 Manage Budgets. Separate future initiative.'
  - id: OOS-4
    item: 'Wallet or category hierarchy / nesting.'
    reason: 'Deferred. Categories remain flat per user as in v0.1.0.'
  - id: OOS-5
    item: 'New backend endpoints beyond the category-join enhancement to GET /transactions.'
    reason: 'Out of scope. All existing endpoints are sufficient.'
  - id: OOS-6
    item: 'Auth / SignIn / SignUp UI changes.'
    reason: 'Out of scope. Auth pages are unchanged and not in the left nav.'
  - id: OOS-7
    item: 'Changes to the left nav (Home + Settings) or Settings page structure.'
    reason: 'Out of scope per explicit user decision — Settings and nav stay as-is.'
  - id: OOS-8
    item: 'Inline transaction editing from the table row.'
    reason: 'Deferred. Editing an existing transaction is not part of the guided UX scope — the focus is on creation flow and contextual resource access.'
  - id: OOS-9
    item: 'Automatic category suggestions based on description.'
    reason: 'Deferred to F-001 Expense Categorization. Requires a separate ML/suggestion feature.'

constraints:
  - 'Left nav (Home + Settings) and Settings page (Wallets / Categories / User tabs) remain unchanged.'
  - 'Auth pages (SignIn / SignUp) unchanged and absent from left nav.'
  - 'All existing server APIs reused; category data added to existing transaction queries via a JOIN — no new endpoints or DB migrations required.'
  - 'Wallet and category edit views reuse the SAME components rendered in Settings tabs; contextual access opens them in a stacked modal, not a separate page.'
  - 'Desktop: right-click context menu on wallet/category labels. Mobile: long-press (touch-hold).'
  - 'Transaction form state must survive the wallet/category edit round-trip (modal slide-out → slide-in pattern).'
  - 'npm test (>=80% coverage) and npm run type-check must remain green.'
  - 'Responsive: context menu becomes action sheet on mobile; wizard works on all viewports.'
  - 'Existing shadcn/ui component library used for modals, context menus, dropdown menus, and wizard steps.'
  - 'No new npm dependencies unless a context-menu or wizard library is required and justifies the cost.'

success_criteria:
  - 'A first-time user with zero wallets sees the 3-step onboarding wizard on Home and can complete wallet → category → transaction creation without leaving the wizard.'
  - 'A returning user with zero wallets sees "You have no wallets yet — create your first wallet" on Home with a working CTA.'
  - 'A returning user with wallets but zero categories sees "You have no categories yet — create your first category" on Home with a working CTA.'
  - 'The transaction table shows a Category column with colored badges for each transaction.'
  - 'Right-clicking a wallet name in a transaction row opens a context menu; selecting "View details" opens the wallet detail/edit view.'
  - 'Long-pressing a category badge on mobile opens an action sheet with "View details" → opens the category detail/edit view.'
  - 'In the Add Transaction dialog, clicking a "Create wallet" or "Create category" link slides in the creation form; submitting it slides back to the transaction form with all fields preserved.'
  - 'npm test passes with >=80% coverage and npm run type-check exits clean.'

references:
  - specs/planning-context.yaml
  - specs/product/VISION_LATEST.yaml
  - specs/release-plan.yaml
  - specs/tech-architecture/TECH_STACK_LATEST.md
  - specs/epics/e06-ui-remake/epic.yaml
