# specs/planning-context.yaml — elaborated 2026-07-14
# Feature: Stacked Modal Fix — Return to Transaction Form from Wallet/Category Actions

feature_name: 'Stacked Modal Fix — Return to Transaction Form from Wallet/Category Actions'

problem_statement: >
  The e08s04 "Stacked Modal Transitions" story was never fully implemented.
  When the Add Transaction dialog is open and the user triggers a wallet or
  category action from within the form (clicking "Don't see your wallet?
  Create one →", "Don't see your category? Create one →", or "View wallet
  details"), the Home component unconditionally closes the transaction dialog
  (setTxOpen(false)) before opening the wallet/category sheet or wizard.
  When that sheet closes, the transaction dialog stays closed and all form
  field values (wallet, amount, description) are lost. The user must start
  the transaction form from scratch.

constraints:
  - 'Transaction form state (wallet dropdown, amount, description) must be preserved when returning from a wallet/category action.'
  - 'Newly created wallets are auto-selected in the wallet dropdown on return.'
  - 'Newly created categories are auto-selected in the category field on return.'
  - 'Use existing WalletDetailSheet and CategoryDetailSheet components. Do not reuse the OnboardingWizard for this flow.'
  - 'Transfer form dialog is unchanged (out of scope).'
  - 'No CSS slide animation required — a simple dialog reopen is sufficient.'
  - 'npm test (>=80% coverage) and npm run type-check must remain green.'
  - 'Existing shadcn/ui Dialogs and Sheets used — no new dependencies.'

out_of_scope:
  - 'Transfer form dialog.'
  - 'Slide animations between dialog and sheet.'
  - 'Context menu changes or long-press behavior.'
  - 'Creating wallets/categories from the transfer form.'

key_decisions:
  - decision: 'Wallet/category creation from the transaction form uses a dedicated creation sheet (not the OnboardingWizard).'
    rationale: 'The wizard is a first-visit onboarding tool. Inline creation should be focused and fast — a simple form in a Sheet that returns to the transaction dialog on completion.'
  - decision: 'Form state preservation via keeping the Dialog mounted while the Sheet is open.'
    rationale: 'The shadcn Dialog unmounts its content when closed. To preserve react-hook-form state, the dialog must stay open (mounted) while the Sheet overlays it.'
  - decision: 'Auto-select newly created resource on return via ref or lifted state.'
    rationale: 'The user should not need to re-select the wallet/category they just created. Pass the new resource id back to the transaction form.'
