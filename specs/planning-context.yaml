# specs/planning-context.yaml — elaborated 2026-07-15, updated 2026-07-15
# Feature: Unified Wallet & Category Modal Refactor (Dialog-based)

feature_name: 'Unified Wallet & Category Modal Refactor'

problem_statement: >
  Wallet and category management currently uses slide-in Sheets with separate
  create/edit/view modes. Users must click "Edit" to leave read-only view
  before making changes — an extra step that adds friction. The transaction
  form is always openable even when no wallets or categories exist, showing
  inline alerts after the fact instead of preventing the action upfront.
  Additionally, the Sheet-based slide-in feels disconnected from the
  Dialog-based transaction form, making nested management awkward.

constraints:
  - 'Reuse existing shadcn/ui primitives (Dialog, Button, Input, Label, Badge, ScrollArea).'
  - 'No new npm dependencies.'
  - 'Reuse existing API modules (api/wallets.ts, api/categories.ts, api/transactions.ts).'
  - 'No new server endpoints or database migrations needed.'
  - 'npm test (>=80% coverage) and npm run type-check must remain green.'
  - 'Category is now mandatory for transactions (client-side enforcement; schema change in TransactionForm only).'
  - 'Nested dialogs use Radix built-in dialog stacking (Dialog over Dialog).'

out_of_scope:
  - 'Changes to the transfer form dialog.'
  - 'New database migrations or server endpoints.'
  - 'Changes to the OnboardingWizard flow (though it may reuse the same modals).'
  - 'Changes to the Profile/SignIn/SignUp pages.'
  - 'Backend enforcement of mandatory category (client-side only for now).'
  - 'Removal of Settings routes or pages (WalletList, Categories) — only the modals they consume change.'

key_decisions:
  - decision: 'Convert WalletModal and CategoryModal from Sheet to Dialog (centered popup).'
    rationale: 'User wants popup modals, not slide-in sidebars. Dialog is already used for the transaction form — consistency across the app. Applies everywhere: Home page, Settings pages, nested from transaction form.'

  - decision: 'Unified CRUD view — drop mode prop and internalMode toggle. Single screen where form fields are always editable.'
    rationale: "No more clicking 'Edit' to switch from view mode. Fields are always live. 'Save Changes' enables on form dirty. 'Delete' always visible. Form-only layout — no separate read-only details section."

  - decision: 'Nested dialogs for transaction-form-launched wallet/category management.'
    rationale: "When the transaction Dialog is open and user clicks 'Create wallet →', the wallet Dialog opens ON TOP. Radix Dialog natively supports this. On close, focus returns to the transaction Dialog underneath. Simpler than the prior sequential-close-reopen approach."

  - decision: 'Auto-select first wallet AND first category when transaction form opens.'
    rationale: 'Reduces friction — the most common case is the user wants to use their default wallet/category. Auto-selection on mount via useEffect.'

  - decision: 'Hard guard: transaction form cannot open if wallets.length === 0 OR categories.length === 0.'
    rationale: "The 'Add transaction' button is disabled with explanatory text. No inline alerts inside the form — the form simply cannot be opened until both wallets and categories exist. This prevents the user from starting a transaction they cannot complete."

  - decision: 'Category is now mandatory in the transaction form (schema change: categoryId z.string().min(1)).'
    rationale: 'Consistent with the hard guard — if we require categories to exist before opening the form, the category field should be required. Client-side only for now.'

  - decision: 'WalletSelectList and CategorySelectList chips emit onEdit callback; parent opens the unified Dialog.'
    rationale: 'The chip list handles selection/display. The parent (Home page or Settings page) handles modal orchestration. Already mostly the pattern — just ensuring onEdit opens the unified Dialog with the item pre-populated.'

  - decision: 'Settings pages (WalletList, Categories) use the same refactored Dialog-based modals.'
    rationale: 'Consistent experience. WalletList and Categories pages stay as list views; clicking an item opens the unified Dialog for edit/delete.'

  - decision: 'WalletModal view mode no longer fetches transactions for the wallet.'
    rationale: "Unified form-only layout doesn't include the transaction list. If wallet transaction viewing is needed later, it would be a separate component. Keeping the modal focused on CRUD."

