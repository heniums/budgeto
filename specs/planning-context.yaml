# specs/planning-context.yaml — elaborated 2026-07-15
# Feature: Wallet & Category Chip-List Selectors in TransactionForm

feature_name: 'Wallet & Category Chip-List Selectors'

problem_statement: >
  The TransactionForm uses plain HTML <select> dropdowns for wallet and category
  choice, which show only text names — no visual identity (colors, icons). Users
  cannot create or edit a wallet/category without navigating away from the form,
  losing their draft transaction. The dropdowns feel disconnected from the
  colorful visual design established for wallets and categories elsewhere.

constraints:
  - 'TransactionForm only — no changes to other forms or existing /categories, /wallets pages.'
  - 'Reuse existing shadcn/ui primitives (Dialog, Badge, Button, etc.) — no new npm dependencies.'
  - 'Wallets: show as badge with colored border + text. Category icons rendered in their color.'
  - 'Category list shows all types (income + expense) mixed together, not filtered by transaction type.'
  - 'Inline edit and creation dialogs use the full existing form fields for their entity.'
  - 'npm test and npm run type-check must remain green.'

out_of_scope:
  - 'Changes to existing /categories or /wallets management pages.'
  - 'Changes to any select inputs outside TransactionForm.'
  - 'New database migrations (wallet color + category icon/color fields already exist).'
  - 'Client-side filtering of categories by type in the chip list.'
  - 'Drag-to-reorder or other gestures beyond tap and long-press.'

key_decisions:
  - decision: 'Replace dropdowns with horizontal scrollable chip-list components (WalletSelectList, CategorySelectList).'
    rationale: "Shows visual identity (color, icon) at a glance, matches the app's design language, and allows inline CRUD without leaving the form."
  - decision: 'Wallet items render as a Badge with colored border and text (name only, no icon).'
    rationale: 'Wallets have a color field but no icon field. Badge with colored border is the simplest visual that distinguishes wallets from categories.'
  - decision: 'Category items render the category icon in the category color.'
    rationale: 'Categories have both icon and color fields. This gives each category a distinct visual identity in the list.'
  - decision: 'Tap selects; long-press opens inline full-form edit dialog.'
    rationale: 'Tap is the primary action (selection); long-press is the secondary action (edit). Inline dialog keeps the transaction draft alive.'
  - decision: '"View All" trigger opens a compact grid modal for browsing and selecting from all items.'
    rationale: 'When the desired item is not visible in the horizontal scroll, the grid offers a complete view without navigating away.'
  - decision: '"+" trigger opens an inline full-form creation dialog.'
    rationale: 'Users can add a new wallet or category without losing their transaction draft.'
  - decision: 'Category list is not filtered by transaction type (income/expense).'
    rationale: 'Users creating an expense may want to see income categories too (e.g. to realize they need a different one). The type is informational, not a hard gate.'
