feature_name: 'Wallet Balance Adjustment'
problem_statement: >
  Wallets have a computed balance (SUM of transaction amounts) but no way to
  directly set it to a target number. Users must manually create offsetting
  transactions, which is slow, error-prone, and lacks a clear audit trail.
constraints:
  - 'Balance Adjustment category must be auto-created per-user on first use'
  - 'Adjustment amount = target - current (positive = add, negative = subtract)'
  - 'Existing transaction CRUD handles editing/deleting adjustment transactions'
  - 'Category type column must be removed first (enabler for clean model)'
out_of_scope:
  - 'Editing/deleting adjustment transactions (existing CRUD covers it)'
  - 'Recurring adjustments'
  - 'Adjustment history beyond normal transaction list'
  - 'Bulk adjustments across multiple wallets'
key_decisions:
  - decision: 'Remove `type` column from categories table'
    rationale: >
      Income/expense is already determined by transaction amount sign. The
      category type creates a false coupling — a single "Balance Adjustment"
      category can serve both directions without a type field.
  - decision: "Single 'Balance Adjustment' category per user, auto-created"
    rationale: >
      Avoids cluttering the category list. One category serves all adjustment
      transactions regardless of direction.
  - decision: 'New dedicated endpoint POST /wallets/:id/adjust'
    rationale: >
      Keeps adjustment logic separate from generic wallet update. Clear intent,
      easier to audit, and the endpoint can own the category-creation +
      transaction-creation atomic flow.
