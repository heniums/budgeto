# specs/planning-context.yaml — written by elaborate-spec; consumed by scope-work and slice-tasks
# Feature: Backend Auth Error Handling Refactor. Elaborated 2026-07-14.

feature_name: 'Backend Auth Error Handling Refactor'

problem_statement: >
  Every protected controller handler (wallets, categories, transactions) contains
  a redundant `if (!req.user) throw unauthorizedError()` guard, even though the
  `authenticate` middleware applied via `router.use(authenticate)` already enforces
  that `req.user` is set before any handler runs. Express skips handlers when
  middleware calls `next(error)`, so these guards are unreachable dead code that
  duplicates the middleware's responsibility and adds noise to every handler.

constraints:
  - 'Only remove dead-code guards in controllers — do not change auth/service.ts business-logic unauthorizedError throws.'
  - 'Use `req.user!` non-null assertion pattern (not a new type alias or runtime helper).'
  - 'No API contract changes, no new dependencies, no test behavior changes.'
  - 'TypeScript must compile clean after changes (tsc --noEmit).'

out_of_scope:
  - 'Introducing a forbiddenError (403) concept or role-based access control.'
  - 'Changing auth/service.ts (login, register, profile, changePassword) error handling.'
  - 'Modifying the authenticate middleware itself.'
  - 'Changing test files beyond any type-level fixes needed after import cleanup.'

key_decisions:
  - decision: 'Remove `if (!req.user) throw unauthorizedError()` from all controller handlers.'
    rationale: 'The authenticate middleware already enforces this; the guards are unreachable dead code.'
  - decision: 'Use `req.user!` non-null assertions in handlers instead of a type-narrowing wrapper.'
    rationale: 'Less invasive, follows existing convention, avoids ceremony.'
  - decision: 'Remove `requireUserId` helper from categories/controller.ts.'
    rationale: 'Its only purpose was wrapping the guard being removed; inline `req.user!.sub` at call sites.'
  - decision: 'Keep auth/service.ts unauthorizedError throws as-is.'
    rationale: 'Those are service-layer business logic (invalid credentials, wrong password) — not middleware concerns.'
